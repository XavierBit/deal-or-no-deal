:root {
  --green:      #27ae60;
  --green-l:    #2ecc71;
  --green-d:    #1a7a40;
  --red:        #e74c3c;
  --red-l:      #ff6b6b;
  --red-d:      #9b1c1c;
  --purple:     #6c5ce7;
  --purple-l:   #a29bfe;
  --purple-d:   #2d1fa3;
  --text-muted: rgba(255,255,255,0.55);
  --card-r:     22px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(46,61,131,0.7) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(108,92,231,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #0d1535 0%, #07091a 100%);
  font-family: 'Outfit', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* -- SCREENS -- */
.screen { display: none; width: 100vw; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

/* -- LOGO BAR -- */
.logo-bar {
  position: fixed;
  top: 18px; left: 22px;
  display: flex; align-items: center; gap: 10px;
  z-index: 100;
}
.logo-bar img { height: 36px; opacity: 0.92; }

.topbar-title {
  position: fixed;
  top: 0; left: 80px; right: 60px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 99;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700;
  font-style: italic;
  color: var(--green-l);
  text-shadow: 0 0 24px rgba(46,204,113,0.3);
  letter-spacing: 0.02em;
}

/* -- QUESTION SCREEN -- */
#screen-game {
  padding: 90px 0 0;
  gap: 0;
  justify-content: flex-start;
}

#screen-stats { padding: 60px 24px 40px; gap: 16px; }

/* Button zone: pinned at top */
.button-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0 0;
  width: 100%;
}

/* THE BIG BUTTON */
.big-button {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  position: relative;
  background: linear-gradient(160deg, var(--green-l) 0%, var(--green) 50%, #1a7a40 100%);
  box-shadow:
    0 10px 0 var(--green-d),
    0 14px 40px rgba(46,204,113,0.5),
    inset 0 2px 0 rgba(255,255,255,0.35);
  transition: transform 0.1s, box-shadow 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

.big-button::before {
  content: '';
  position: absolute;
  top: 6%; left: 8%; right: 8%;
  height: 42%;
  background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, transparent 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  pointer-events: none;
}

.big-button:hover {
  transform: translateY(-4px);
  box-shadow:
    0 14px 0 var(--green-d),
    0 22px 50px rgba(46,204,113,0.6),
    inset 0 2px 0 rgba(255,255,255,0.35);
}

.big-button:active, .big-button.pressed {
  transform: translateY(8px);
  box-shadow:
    0 2px 0 var(--green-d),
    0 4px 20px rgba(46,204,113,0.4),
    inset 0 2px 0 rgba(255,255,255,0.2);
}

.big-button .btn-label {
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  position: relative;
  z-index: 1;
}

.big-button .btn-icon {
  font-size: 2.2rem;
  position: relative;
  z-index: 1;
  line-height: 1;
}

/* DECLINE button */
.decline-btn {
  background: linear-gradient(160deg, var(--red-l) 0%, var(--red) 50%, #c0392b 100%);
  border: none;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 14px 40px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow:
    0 6px 0 var(--red-d),
    0 10px 28px rgba(231,76,60,0.45);
  transition: transform 0.1s, box-shadow 0.1s;
  outline: none;
}
.decline-btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 9px 0 var(--red-d),
    0 16px 36px rgba(231,76,60,0.55);
}
.decline-btn:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 var(--red-d),
    0 4px 14px rgba(231,76,60,0.3);
}

/* Cards zone: fills remaining height, centers content */
.cards-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 720px;
  padding: 0 24px 36px;
  flex: 1;
  justify-content: flex-start;
  padding-top: 56px;
}

.cards-group .decline-btn {
  margin-top: 20px;
}

.cards-group .progress-bar-wrap {
  margin-top: 32px;
}

/* SCENARIO CARDS */
.scenario-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--card-r);
  padding: 24px 32px;
  max-width: 680px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(8px);
}

.scenario-positive {
  font-size: clamp(1.6rem, 3.2vw, 2.2rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.45;
}

.but-divider {
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--purple-l);
  text-shadow: 0 0 30px rgba(162,155,254,0.5);
  line-height: 1;
  margin: 4px 0;
}

.scenario-negative {
  font-size: clamp(1.6rem, 3.2vw, 2.2rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.45;
}

/* NAV DOTS */
.progress-bar-wrap {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.progress-bar-track {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--purple) 0%, var(--purple-l) 100%);
  transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
}

/* -- STATS SCREEN -- */
#screen-stats, #screen-end { justify-content: center; }


.stats-question-summary {
  max-width: 720px;
  width: 100%;
  text-align: center;
  margin-bottom: 28px;
}

.stats-positive {
  font-size: clamp(1.4rem, 2.8vw, 2rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.45;
}

.stats-but {
  font-size: clamp(1.2rem, 2.4vw, 1.7rem);
  font-weight: 700;
  color: #fff;
  margin-top: 8px;
  line-height: 1.45;
}

.stats-but-label {
  font-weight: 900;
  color: var(--purple-l);
  letter-spacing: 0.05em;
}

/* Chart area */
.stats-chart-wrap {
  max-width: 680px;
  width: 100%;
  margin-bottom: 24px;
}

.bar-row {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bar-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.bar-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.bar-choice-label {
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.bar-choice-label.pressed { color: var(--green-l); }
.bar-choice-label.declined { color: var(--red-l); }

.bar-pct {
  font-size: 2.2rem;
  font-weight: 900;
  color: #fff;
}

.bar-track {
  height: 48px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 10px;
  width: 0;
  transition: width 1.1s cubic-bezier(0.22,1,0.36,1);
  position: relative;
}

.bar-fill.pressed {
  background: linear-gradient(90deg, var(--green) 0%, var(--green-l) 100%);
  box-shadow: 0 0 20px rgba(46,204,113,0.4);
}

.bar-fill.declined {
  background: linear-gradient(90deg, var(--red-d) 0%, var(--red-l) 100%);
  box-shadow: 0 0 20px rgba(231,76,60,0.4);
}

.bar-fill.my-choice::after {
  content: ' YOU';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
}

.bar-count {
  font-size: 1rem;
  color: #fff;
  font-weight: 600;
}

/* stats summary sentence */
.stats-sentence {
  max-width: 680px;
  width: 100%;
  text-align: center;
  font-size: clamp(1.1rem, 2.2vw, 1.5rem);
  color: #fff;
  line-height: 1.7;
  margin-bottom: 24px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--card-r);
  padding: 20px 28px;
}

.stats-sentence strong {
  color: #fff;
  font-weight: 900;
}

.stats-next-btn {
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-d) 100%);
  border: none;
  border-radius: 50px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 16px 48px;
  cursor: pointer;
  box-shadow:
    0 6px 0 var(--purple-d),
    0 10px 28px rgba(108,92,231,0.45);
  transition: transform 0.1s, box-shadow 0.1s;
  outline: none;
}
.stats-next-btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 9px 0 var(--purple-d),
    0 16px 36px rgba(108,92,231,0.55);
}
.stats-next-btn:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 var(--purple-d),
    0 4px 14px rgba(108,92,231,0.3);
}

/* -- END SCREEN -- */
#screen-end {
  gap: 20px;
  padding: 40px 24px;
  text-align: center;
}
#screen-end h2 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 900;
  color: #fff;
}
#screen-end p {
  color: var(--text-muted);
  font-size: 1.05rem;
  max-width: 480px;
}
.restart-btn {
  margin-top: 10px;
  background: linear-gradient(135deg, var(--green-l) 0%, var(--green) 100%);
  border: none;
  border-radius: 50px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 16px 48px;
  cursor: pointer;
  box-shadow: 0 6px 0 var(--green-d), 0 10px 28px rgba(46,204,113,0.45);
  transition: transform 0.1s, box-shadow 0.1s;
  outline: none;
}
.restart-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 var(--green-d), 0 16px 36px rgba(46,204,113,0.55);
}

/* -- FOOTER CREDIT -- */
.footer-credit {
  position: fixed;
  bottom: 14px; right: 18px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.28);
  pointer-events: none;
  z-index: 100;
}

/* -- EDITOR SCREEN -- */
#screen-editor {
  padding: 70px 24px 40px;
  gap: 0;
  justify-content: flex-start;
  align-items: center;
}

.editor-header {
  width: 100%;
  max-width: 760px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.editor-title {
  font-size: 1.3rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.04em;
}

.editor-header-btns {
  display: flex;
  gap: 10px;
}

.editor-list {
  width: 100%;
  max-width: 760px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  max-height: calc(100vh - 260px);
  padding-right: 4px;
}

.editor-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
}

.editor-row-num {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 24px;
  padding-top: 10px;
  text-align: right;
}

.editor-inputs {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.editor-inputs textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  padding: 9px 12px;
  resize: none;
  outline: none;
  line-height: 1.45;
  transition: border-color 0.2s;
}

.editor-inputs textarea:focus {
  border-color: rgba(255,255,255,0.4);
}

.editor-inputs textarea::placeholder {
  color: rgba(255,255,255,0.3);
}

.editor-inputs label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: -4px;
}

.editor-del-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.25);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 6px 4px;
  line-height: 1;
  transition: color 0.2s;
  flex-shrink: 0;
}
.editor-del-btn:hover { color: var(--red-l); }

.editor-footer {
  width: 100%;
  max-width: 760px;
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.btn-editor-add {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-editor-add:hover { background: rgba(255,255,255,0.14); }

.btn-editor-save {
  background: linear-gradient(135deg, var(--green-l) 0%, var(--green) 100%);
  border: none;
  border-radius: 50px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 28px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--green-d);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-editor-save:hover { transform: translateY(-2px); }
.btn-editor-save:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--green-d); }

.btn-editor-export {
  background: rgba(162,155,254,0.15);
  border: 1px solid rgba(162,155,254,0.35);
  border-radius: 50px;
  color: var(--purple-l);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-editor-export:hover { background: rgba(162,155,254,0.25); }

.btn-editor-import {
  background: rgba(162,155,254,0.15);
  border: 1px solid rgba(162,155,254,0.35);
  border-radius: 50px;
  color: var(--purple-l);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-editor-import:hover { background: rgba(162,155,254,0.25); }
.btn-editor-import input { display: none; }

.btn-editor-reset {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 10px 8px;
  cursor: pointer;
  margin-left: auto;
  transition: color 0.2s;
}
.btn-editor-reset:hover { color: var(--red-l); }

.editor-saved-msg {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--green-l);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.editor-saved-msg.visible { opacity: 1; }

/* Gear icon button */
.gear-btn {
  position: fixed;
  top: 16px; right: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  z-index: 100;
  transition: background 0.2s;
  color: rgba(255,255,255,0.6);
}
.gear-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

/* -- SLIDE TRANSITION -- */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(60px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide-in { animation: slideInRight 0.38s cubic-bezier(0.22,1,0.36,1) both; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.45s ease both; }
</style>
</head>

          <span class="bar-pct" id="pct-decline">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill declined" id="bar-decline"></div>
        </div>
        <span class="bar-count" id="count-decline"></span>
      </div>
    </div>
  </div>

  <div class="stats-sentence fade-in" id="stats-sentence"></div>

  <button class="stats-next-btn" onclick="nextQuestion()">Next question &rarr;</button>
</div>

<button class="gear-btn" onclick="openEditor()" title="Edit questions">⚙️</button>

<!-- END SCREEN -->
<div class="screen" id="screen-end">
  <div style="font-size:3rem">🎉</div>
  <h2>That's all of them!</h2>
  <p>You've powered through all the dilemmas. Impressive commitment to chaos.</p>
  <button class="restart-btn" onclick="restartGame()">Go again</button>
</div>

<!-- EDITOR SCREEN -->
<div class="screen" id="screen-editor">
  <div class="editor-header">
    <div class="editor-title">Edit Questions</div>
    <div class="editor-header-btns">
      <button class="gear-btn" style="position:static;width:auto;height:auto;border-radius:50px;padding:8px 18px;font-size:0.85rem;font-weight:700;color:rgba(255,255,255,0.7);" onclick="closeEditor()">Back to game</button>
    </div>
  </div>

  <div class="editor-list" id="editor-list"></div>

  <div class="editor-footer">
    <button class="btn-editor-add" onclick="addEditorRow()">+ Add question</button>
    <button class="btn-editor-save" onclick="saveEditor()">Save</button>
    <span class="editor-saved-msg" id="editor-saved-msg">Saved!</span>
    <button class="btn-editor-export" onclick="exportQuestions()">Export JSON</button>
    <label class="btn-editor-import">Import JSON<input type="file" accept=".json" onchange="importQuestions(event)"></label>
    <button class="btn-editor-reset" onclick="resetToDefaults()">Reset to defaults</button>
  </div>
</div>

<script>
// -- DEFAULT QUESTIONS --
const DEFAULT_QUESTIONS = [
  { positive: "You can eat anything you want and never gain weight.", but: "Everything you eat tastes exactly like unsalted crackers." },
  { positive: "You will never have to work again.", but: "You can only leave your house once a week." },
  { positive: "You become fluent in every language on Earth.", but: "You permanently lose the ability to listen to music." },
  { positive: "You get a 50% raise at work starting today.", but: "Your most embarrassing memory is publicly posted online." },
  { positive: "You can fly wherever you want for free, any airline, any time.", but: "Every flight takes at least 12 hours regardless of the distance." },
  { positive: "You will live to be 150 years old in perfect health.", but: "Everyone you love will age and die at the normal rate." },
  { positive: "You can read anyone's mind whenever you choose.", but: "You can never turn it off in crowded places." },
  { positive: "You wake up tomorrow famous worldwide.", but: "It is for something deeply embarrassing you did as a teenager." },
  { positive: "You get a free luxury apartment in the city of your choice.", but: "You must share it with a random stranger at all times." },
  { positive: "You can pause time for up to one hour whenever you want.", but: "You age twice as fast during every pause." },
  { positive: "You instantly become the world's best cook.", but: "You lose all ability to enjoy food you did not prepare yourself." },
  { positive: "You win the lottery - enough to retire comfortably.", but: "You must give 80% of it to a cause chosen by a stranger." },
  { positive: "You are always the most attractive person in any room.", but: "People constantly underestimate your intelligence because of it." },
  { positive: "You can speak to animals and they understand you perfectly.", but: "Animals can also speak to you and they never stop complaining." },
  { positive: "You get a brand new car of your choice every year.", but: "You are not allowed to use any other form of transport." },
  { positive: "You can teleport anywhere in the world instantly.", but: "You arrive 10 minutes before or after your intended time, randomly." },
  { positive: "You have a photographic memory for everything you read.", but: "You forget the face of everyone you meet within 24 hours." },
  { positive: "You can breathe underwater indefinitely.", but: "You are mildly allergic to sunlight and must cover up outdoors." },
  { positive: "You never need to sleep and feel perfectly rested at all times.", but: "You experience intense boredom every night between 2am and 5am." },
  { positive: "You discover you have a talent for art and instantly paint masterpieces.", but: "You lose the ability to appreciate any other artist's work." },
  { positive: "You can have any job in the world with instant qualifications.", but: "You must change careers completely every two years." },
  { positive: "You are always right in every argument.", but: "Nobody ever believes you until they figure it out themselves." },
  { positive: "You can go back and relive any single day of your life perfectly.", but: "You permanently forget the five years before that day." },
  { positive: "You can run as fast as a car on a motorway.", but: "You have absolutely no sense of direction whatsoever." },
  { positive: "Every person you meet immediately likes and trusts you.", but: "Your closest friends gradually find you less and less interesting." }
];

const STORAGE_KEY = 'wyptb_questions';

// -- LOAD / SAVE QUESTIONS --
function loadQuestions() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return DEFAULT_QUESTIONS.map(q => Object.assign({}, q));
}

function saveQuestions(qs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(qs));
}

// -- STATE --
let QUESTIONS = loadQuestions();
let currentIndex = 0;
let playerChoice = null;
const statsCache = {};

// -- STATS --
function initStats() {
  QUESTIONS.forEach((_, i) => {
    const total      = Math.floor(Math.random() * (500000 - 7000 + 1)) + 7000;
    const pressPct   = Math.floor(Math.random() * 73) + 14;
    const pressCount = Math.round(total * pressPct / 100);
    statsCache[i]    = { total, pressPct, pressCount, declineCount: total - pressCount, declinePct: 100 - pressPct };
  });
}

// -- DOTS --
function updateProgressBar() {
  const pct = ((currentIndex + 1) / QUESTIONS.length) * 100;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
}

// -- LOAD QUESTION --
function loadQuestion() {
  const q = QUESTIONS[currentIndex];
  document.getElementById('scenario-positive').textContent = q.positive;
  document.getElementById('scenario-but-text').textContent = q.but;

  const card = document.getElementById('scenario-card-positive');
  card.classList.remove('slide-in');
  void card.offsetWidth;
  card.classList.add('slide-in');

  document.getElementById('btn-press').disabled = false;
  document.getElementById('btn-decline').disabled = false;
  document.getElementById('btn-press').classList.remove('pressed');

  updateProgressBar();
  showScreen('screen-game');
}

// -- MAKE CHOICE --
function makeChoice(choice) {
  playerChoice = choice;
  document.getElementById('btn-press').disabled = true;
  document.getElementById('btn-decline').disabled = true;

  if (choice === 'press') {
    document.getElementById('btn-press').classList.add('pressed');
    setTimeout(() => showStats(), 350);
  } else {
    showStats();
  }
}

// -- SHOW STATS --
function showStats() {
  const q = QUESTIONS[currentIndex];
  const s = statsCache[currentIndex];

  document.getElementById('stats-positive-text').textContent = q.positive;
  document.getElementById('stats-but-text').textContent = q.but;

  const pressBar   = document.getElementById('bar-press');
  const declineBar = document.getElementById('bar-decline');
  pressBar.className   = 'bar-fill pressed'  + (playerChoice === 'press'   ? ' my-choice' : '');
  declineBar.className = 'bar-fill declined' + (playerChoice === 'decline' ? ' my-choice' : '');

  document.getElementById('pct-press').textContent     = s.pressPct   + '%';
  document.getElementById('pct-decline').textContent   = s.declinePct + '%';
  document.getElementById('count-press').textContent   = formatNumber(s.pressCount)   + ' people slammed that button';
  document.getElementById('count-decline').textContent = formatNumber(s.declineCount) + ' people wisely (or cowardly) passed';

  showScreen('screen-stats');

  setTimeout(() => {
    pressBar.style.width   = s.pressPct   + '%';
    declineBar.style.width = s.declinePct + '%';
  }, 80);

  const majority     = s.pressPct > 50 ? 'press' : 'decline';
  const withMajority = playerChoice === majority;
  const choiceLabel  = playerChoice === 'press' ? 'pressed it' : 'passed';
  const pressedVerb  = playerChoice === 'press' ? 'brave soul' : 'button-avoider';

  let sentence;
  if (withMajority) {
    sentence = `You ${choiceLabel} - and so did the majority. <strong>${formatNumber(s.total)} people</strong> weighed in on this one: <strong>${formatNumber(s.pressCount)} (${s.pressPct}%)</strong> pressed the button, while <strong>${formatNumber(s.declineCount)} (${s.declinePct}%)</strong> kept their finger to themselves.`;
  } else {
    sentence = `Bold choice, ${pressedVerb}. You went against the grain. Out of <strong>${formatNumber(s.total)} people</strong> who faced this: <strong>${formatNumber(s.pressCount)} (${s.pressPct}%)</strong> pressed it, while <strong>${formatNumber(s.declineCount)} (${s.declinePct}%)</strong> walked away.`;
  }
  document.getElementById('stats-sentence').innerHTML = sentence;
}

// -- NEXT / RESTART --
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= QUESTIONS.length) { showScreen('screen-end'); return; }
  loadQuestion();
}

function restartGame() {
  currentIndex = 0;
  playerChoice = null;
  QUESTIONS = loadQuestions();
  initStats();
  loadQuestion();
}

// -- EDITOR --
function openEditor() {
  buildEditorList();
  showScreen('screen-editor');
}

function closeEditor() {
  QUESTIONS = loadQuestions();
  currentIndex = 0;
  initStats();
  loadQuestion();
}

function buildEditorList() {
  const qs   = loadQuestions();
  const list = document.getElementById('editor-list');
  list.innerHTML = '';
  qs.forEach((q, i) => list.appendChild(makeEditorRow(q, i, qs.length)));
}

function makeEditorRow(q, i, total) {
  const row = document.createElement('div');
  row.className = 'editor-row';
  row.dataset.index = i;
  row.innerHTML = `
    <div class="editor-row-num">${i + 1}</div>
    <div class="editor-inputs">
      <label>Positive part</label>
      <textarea rows="2" placeholder="You can eat anything you want and never gain weight." class="ed-positive">${escHtml(q.positive)}</textarea>
      <label>But...</label>
      <textarea rows="2" placeholder="everything you eat tastes exactly like unsalted crackers." class="ed-but">${escHtml(q.but)}</textarea>
    </div>
    <button class="editor-del-btn" onclick="deleteEditorRow(${i})" title="Delete">✕</button>`;
  return row;
}

function addEditorRow() {
  const qs = collectEditorRows();
  qs.push({ positive: '', but: '' });
  saveQuestions(qs);
  buildEditorList();
  // Scroll to bottom
  const list = document.getElementById('editor-list');
  list.scrollTop = list.scrollHeight;
  // Focus first textarea of last row
  const rows = list.querySelectorAll('.editor-row');
  if (rows.length) rows[rows.length - 1].querySelector('.ed-positive').focus();
}

function deleteEditorRow(i) {
  const qs = collectEditorRows();
  if (qs.length <= 1) { alert('You need at least one question.'); return; }
  qs.splice(i, 1);
  saveQuestions(qs);
  buildEditorList();
}

function saveEditor() {
  const qs = collectEditorRows().filter(q => q.positive.trim() || q.but.trim());
  if (!qs.length) { alert('Add at least one question before saving.'); return; }
  saveQuestions(qs);
  buildEditorList();
  const msg = document.getElementById('editor-saved-msg');
  msg.classList.add('visible');
  setTimeout(() => msg.classList.remove('visible'), 2000);
}

function collectEditorRows() {
  const rows = document.querySelectorAll('#editor-list .editor-row');
  return Array.from(rows).map(row => ({
    positive: row.querySelector('.ed-positive').value.trim(),
    but:      row.querySelector('.ed-but').value.trim()
  }));
}

function resetToDefaults() {
  if (!confirm('Reset all questions to the built-in defaults? Your custom questions will be lost.')) return;
  saveQuestions(DEFAULT_QUESTIONS.map(q => Object.assign({}, q)));
  buildEditorList();
  const msg = document.getElementById('editor-saved-msg');
  msg.classList.add('visible');
  setTimeout(() => msg.classList.remove('visible'), 2000);
}

// -- EXPORT --
function exportQuestions() {
  const qs   = loadQuestions();
  const blob = new Blob([JSON.stringify(qs, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'press-the-button-questions.json';
  a.click();
  URL.revokeObjectURL(url);
}

// -- IMPORT --
function importQuestions(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data) || !data.length || !data[0].positive || !data[0].but) {
        alert('Invalid file format. Expected an array of { positive, but } objects.');
        return;
      }
      const qs = data.map(q => ({ positive: String(q.positive).trim(), but: String(q.but).trim() }))
                     .filter(q => q.positive && q.but);
      if (!qs.length) { alert('No valid questions found in the file.'); return; }
      saveQuestions(qs);
      buildEditorList();
      const msg = document.getElementById('editor-saved-msg');
      msg.textContent = `Imported ${qs.length} questions!`;
      msg.classList.add('visible');
      setTimeout(() => { msg.classList.remove('visible'); msg.textContent = 'Saved!'; }, 3000);
    } catch(err) {
      alert('Could not read the file. Make sure it is a valid JSON export.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// -- UTILS --
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatNumber(n) {
  return n.toLocaleString('en-US');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// -- INIT --
initStats();
loadQuestion();
</script>
</body>
</html>
